<!DOCTYPE html>
<html>
<body style="text-align: center; font-family: sans-serif; padding-top: 50px;">
  <div id="content">
    <h1>Connecting...</h1>
  </div>

  <script>
    var hash = window.location.hash;
    if (hash.indexOf('access_token') !== -1) {
        // Step 1: Show Success to the user
        document.getElementById('content').innerHTML = 
          "<h1 style='color: green;'>✅ Login Successful!</h1>" +
          "<p>Your Google account is linked. This window should close shortly.</p>" +
          "<button onclick='manualClose()' style='padding:10px;'>Close Manually</button>";

        // Step 2: Prepare the link back to the Pebble App
        var returnLink = "pebblejs://close#" + encodeURIComponent(hash.substring(1));

        function manualClose() {
          window.location.href = returnLink;
        }

        // Step 3: Try to close automatically after 2 seconds
        setTimeout(manualClose, 2000);
    } else {
        document.getElementById('content').innerHTML = "<h1>Error: No token received.</h1>";
    }
  </script>
</body>
</html>
